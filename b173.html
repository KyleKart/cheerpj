<body>
  <script src="https://cjrtnc.leaningtech.com/4.2/loader.js"></script>
  <script>
    (async () => {
      const pathJarMinecraft = '/app/cheerpj/bcraft.jar';
      const pathJarLibs = `/app/cheerpj/lwjgl/lwjgl-2.9.3.jar:/app/cheerpj/lwjgl/lwjgl_util-2.9.3.jar:${pathJarMinecraft}`;
      try {
          await cheerpjInit({
          javaProperties: ['java.library.path=/app/cheerpj/lwjgl/libraries/'],
          libraries: { '/cheerpj/lwjgl/libGL.so.1': '/app/cheerpj/lwjgl/libraries/gl4es.wasm' },
          enableX11: true,
        });
        cheerpjCreateDisplay(-1, -1, document.body);
        await cheerpjRunMain("net.minecraft.client.Minecraft", pathJarLibs);
      } catch (err) {
        console.error(err);
      }
    })();
  </script>
</body>
